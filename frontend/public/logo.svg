<svg xmlns="http://www.w3.org/2000/svg"
     width="700"
     height="140"
     viewBox="0 0 700 140">

    <!-- Background -->
    <rect width="700" height="140" fill="white"/>

    <!-- Logo Icon -->
    <g transform="translate(20,20)">

        <!-- Rounded square -->
        <rect
            x="0"
            y="0"
            width="90"
            height="90"
            rx="18"
            fill="#D32F2F"/>

        <!-- Stylized V -->
        <path
            d="M18 18
               L45 78
               L72 18
               L58 18
               L45 50
               L32 18
               Z"
            fill="white"/>

    </g>

    <!-- Brand Name -->
    <text
        x="135"
        y="83"
        font-family="Segoe UI, Arial, Helvetica, sans-serif"
        font-size="64"
        font-weight="700"
        letter-spacing="3"
        fill="#D32F2F">
        VESTRA
    </text>

</svg>